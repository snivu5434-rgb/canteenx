<!DOCTYPE html>
<html>
<head>
<title>Confirmation</title>

<style>
body{
  font-family: Arial;
  background:#bcd4f8;
  text-align:center;
}

.container{
  width:80%;
  margin:auto;
  background:white;
  padding:20px;
  margin-top:40px;
  border-radius:10px;
  box-shadow:0 0 10px gray;
}

h2{
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
}

th, td{
  border:1px solid #ccc;
  padding:10px;
}

th{
  background:#a8c7e0;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin:20px;
}

.btns{
  display:flex;
  justify-content:center;
  gap:20px;
}

.back{
  background:#999;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.confirm{
  background:green;
  color:white;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Confirmation Order</h2>

<table id="orderTable">
<tr>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
</tr>
</table>

<div class="total">
Total Amount: ₹<span id="totalAmt"></span>
</div>

<div class="btns">
  <button class="back" onclick="goBack()">Back to Menu</button>
  <button class="confirm" onclick="goPayment()">Confirm & Pay</button>
</div>

</div>

<script>

// LOAD DATA
let cart = JSON.parse(localStorage.getItem("cart")) || {};
let total = localStorage.getItem("totalAmount") || 0;

let table = document.getElementById("orderTable");

// DISPLAY ITEMS
for(let item in cart){
  let row = `
    <tr>
      <td>${item}</td>
      <td>₹${cart[item].price}</td>
      <td>${cart[item].qty}</td>
      <td>₹${cart[item].price * cart[item].qty}</td>
    </tr>
  `;
  table.innerHTML += row;
}

// TOTAL
document.getElementById("totalAmt").innerText = total;

// BUTTON ACTIONS
function goBack(){
  window.location.href = "menu.html";
}

function goPayment(){
  window.location.href = "payment.html";
}

</script>

</body>
</html>
