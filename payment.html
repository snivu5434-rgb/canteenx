<!DOCTYPE html>
<html>
<head>
  <title>Payment Page</title>

  <style>
    body{
      font-family: Arial;
      background: #bddcf7;
      text-align:center;
    }

    .box{
      margin-top:60px;
      background:white;
      padding:20px;
      width:380px;
      margin-left:auto;
      margin-right:auto;
      border-radius:16px;
      box-shadow:0 0 18px rgba(0,0,0,0.2);
    }

    .upiText{
      font-size:14px;
      color:rgb(94, 85, 85);
      margin-top:-10px;
    }
s
    .phoneCard{
      margin-top:10px;
      padding:18px;
      border-radius:18px;
      background:#f8f9ff;
      border:1px solid #ddd;
    }

    .qrWrap{
      background:white;
      padding:15px;
      border-radius:12px;
      display:flex;
      justify-content:center;
      align-items:center;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.1);
    }

    #qr{
      width:220px;
      height:220px;
      background: url("https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=UPI-PAYMENT") no-repeat center;
      background-size:cover;
      border-radius:10px;
    }

    .amount{
      font-size:26px;
      font-weight:bold;
      margin:15px 0;
    }

    .payBtn{
      background:green;
      color:white;
      padding:12px;
      border:none;
      width:100%;
      margin-top:10px;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
    }

    .upiId{
      margin-top:10px;
      font-size:14px;
      font-weight:bold;
      color:#333;
      background:#e8fff0;
      padding:8px;
      border-radius:8px;
    }

    .historyBtn{
      position:absolute;
      top:10px;
      right:10px;
      background:orange;
      border:none;
      padding:10px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<button class="historyBtn" onclick="goHistory()">HISTORY</button>

<div class="box">

  <h2>SCAN & PAY</h2>
  <p class="upiText">Use any UPI App</p>

  <div class="phoneCard">

    <div class="qrWrap">
      <div id="qr"></div>
    </div>

    <!-- UPI ID ADDED -->
    <div class="upiId">
      UPI ID: foodorder@ybl
    </div>

    <div class="amount" id="amountBox">₹0</div>

    <button class="payBtn" onclick="makePayment()">
      PAYMENT DONE
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
